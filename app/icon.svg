<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Tamagotcha">
  <!-- Warm app background -->
  <rect width="64" height="64" rx="14" fill="#fff8ef"/>

  <!-- Pink tamagotchi shell -->
  <rect x="12" y="10" width="40" height="44" rx="14" fill="#ffb8d1" stroke="#2f2418" stroke-width="2.5"/>

  <!-- LCD screen -->
  <rect x="18" y="16" width="28" height="22" rx="6" fill="#dff6ff" stroke="#2f2418" stroke-width="2"/>

  <!-- Tiny pixel pet face -->
  <rect x="26" y="24" width="3" height="3" fill="#2f2418"/>
  <rect x="35" y="24" width="3" height="3" fill="#2f2418"/>
  <rect x="28" y="31" width="8" height="2" rx="1" fill="#2f2418"/>

  <!-- Status hearts -->
  <rect x="21" y="19" width="2" height="2" fill="#ff6b9d"/>
  <rect x="24" y="19" width="2" height="2" fill="#ff6b9d"/>

  <!-- Device buttons -->
  <circle cx="24" cy="46" r="2.5" fill="#2f2418"/>
  <circle cx="32" cy="46" r="3" fill="#2f2418"/>
  <circle cx="40" cy="46" r="2.5" fill="#2f2418"/>
</svg>
